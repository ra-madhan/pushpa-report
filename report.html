<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Report | Excel to JSON (No Storage)</title>
  <!-- SheetJS for Excel parsing -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    h2 {
      color: #2c3e66;
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    .subtitle {
      color: #6c7a8e;
      font-size: 0.85rem;
      margin-bottom: 24px;
      border-bottom: 2px solid #eef2f8;
      padding-bottom: 12px;
    }

    .info-card {
      background: #f8f9fc;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #e9ecef;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 0.95rem;
    }

    .info-label {
      font-weight: 600;
      color: #495057;
    }

    .info-value {
      color: #2c3e66;
      font-weight: 700;
    }

    .badge {
      background: #e8f4fd;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #0066cc;
    }

    input, button {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #dce3ec;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }

    button {
      background: #2c3e66;
      color: white;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #1f2c48;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #6c757d;
    }

    button.secondary:hover {
      background: #5a6268;
    }

    button.danger {
      background: #dc3545;
    }

    button.danger:hover {
      background: #c82333;
    }

    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.85rem;
    }

    .msg.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .msg.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .msg.warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }

    .file-info {
      background: #f1f3f5;
      border-radius: 12px;
      padding: 10px;
      margin: 8px 0;
      font-size: 0.8rem;
      word-break: break-all;
    }

    .json-preview {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.7rem;
      font-family: monospace;
      margin-top: 12px;
      border: 1px solid #e9ecef;
    }

    .json-preview summary {
      cursor: pointer;
      font-weight: 600;
      color: #2c3e66;
      margin-bottom: 8px;
    }

    hr {
      margin: 20px 0;
      border: none;
      border-top: 1px solid #e9ecef;
    }

    .units-hint {
      font-size: 0.75rem;
      color: #6c757d;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>📊 Daily Report</h2>
    <div class="subtitle">📁 Excel → JSON → Firestore (No Storage, No CORS)</div>

    <div class="info-card">
      <div class="info-row">
        <span class="info-label">📅 Today's Date:</span>
        <span class="info-value" id="todayDate">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">🔢 Previous Reading:</span>
        <span class="info-value" id="prevReading">0</span>
        <span class="badge">from last report</span>
      </div>
      <div class="info-row">
        <span class="info-label">👤 Logged in as:</span>
        <span class="info-value" id="userEmail">—</span>
      </div>
    </div>

    <form id="reportForm" onsubmit="event.preventDefault(); submitReport();">
      <label style="font-weight: 500; display: block; margin-bottom: 4px;">📎 Excel File (.xlsx, .xls, .csv)</label>
      <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" required>
      
      <label style="font-weight: 500; display: block; margin-top: 12px;">⚡ Current Reading (Units)</label>
      <input type="number" id="currentReading" step="0.01" placeholder="Enter current meter reading" required>
      <div class="units-hint" id="unitsHint"></div>
      
      <button type="submit">📤 Submit & Store JSON in Firestore</button>
    </form>

    <button onclick="logout()" class="secondary" style="margin-top: 8px;">🚪 Logout</button>
    <div id="message" class="msg"></div>
  </div>

  <div class="card" id="jsonPreviewCard" style="display: none;">
    <h3>📋 Excel Data as JSON (Stored in Firestore)</h3>
    <div id="jsonPreview" class="json-preview"></div>
  </div>
</div>

<script type="module">
  // Firebase imports (NO STORAGE)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs, addDoc, orderBy, limit, doc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  // ❌ NO STORAGE IMPORT - REMOVED

  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyA52MaRGQ2m1iAX21zbdKMvweEqsPoZL3w",
    authDomain: "pushpa-report.firebaseapp.com",
    projectId: "pushpa-report",
    storageBucket: "pushpa-report.firebasestorage.app",
    messagingSenderId: "209660404105",
    appId: "1:209660404105:web:74fa46b3f860c3ec508158"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  // ❌ NO STORAGE INSTANCE - REMOVED

  let currentUser = null;
  let previousReading = 0;
  let existingDoc = null;
  let excelJSONData = null;

  // DOM elements
  const todaySpan = document.getElementById("todayDate");
  const prevReadingSpan = document.getElementById("prevReading");
  const userEmailSpan = document.getElementById("userEmail");
  const messageDiv = document.getElementById("message");
  const excelFileInput = document.getElementById("excelFile");
  const jsonPreviewCard = document.getElementById("jsonPreviewCard");
  const jsonPreviewDiv = document.getElementById("jsonPreview");
  const currentReadingInput = document.getElementById("currentReading");
  const unitsHint = document.getElementById("unitsHint");

  // Helper: get today's date YYYY-MM-DD
  function getToday() {
    return new Date().toISOString().split("T")[0];
  }

  todaySpan.innerText = getToday();

  // 🔐 Auth State
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    currentUser = user;
    userEmailSpan.innerText = user.email || "User";
    await checkTodayReport();
    await getPreviousReading();
  });

  // 📅 Check if report exists for today
  async function checkTodayReport() {
    if (!currentUser) return;
    const q = query(
      collection(db, "reports"),
      where("userId", "==", currentUser.uid),
      where("date", "==", getToday())
    );
    const snap = await getDocs(q);
    if (!snap.empty) {
      existingDoc = snap.docs[0];
      const data = existingDoc.data();
      const createdAt = data.createdAt?.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
      const diffHours = (new Date() - createdAt) / (1000 * 60 * 60);
      if (diffHours > 1) {
        messageDiv.innerHTML = "🔒 Report locked (1 hour passed). You cannot submit again today.";
        messageDiv.className = "msg error";
        document.getElementById("reportForm").style.display = "none";
      } else {
        messageDiv.innerHTML = "✏️ Editing allowed (within 1 hour). You can update today's report.";
        messageDiv.className = "msg warning";
        if (data.currentReading) {
          currentReadingInput.value = data.currentReading;
        }
      }
    } else {
      messageDiv.innerHTML = "✅ No report for today. You can submit new.";
      messageDiv.className = "msg success";
    }
  }

  // 📊 Get previous reading
  async function getPreviousReading() {
    if (!currentUser) return;
    const q = query(
      collection(db, "reports"),
      where("userId", "==", currentUser.uid),
      orderBy("date", "desc"),
      limit(1)
    );
    const snap = await getDocs(q);
    if (!snap.empty) {
      previousReading = snap.docs[0].data().currentReading || 0;
    }
    prevReadingSpan.innerText = previousReading;
  }

  // 📎 Excel to JSON parser
  async function parseExcelToJSON(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonRows = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
        
        const cleanedData = jsonRows.filter(row => {
          return Object.values(row).some(v => v !== undefined && v !== null && v !== "");
        }).map(row => {
          const cleanRow = {};
          for (let [key, value] of Object.entries(row)) {
            cleanRow[key] = (value === undefined || value === null || value === "") ? null : value;
          }
          return cleanRow;
        });
        
        resolve(cleanedData);
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  // Show preview of Excel data
  async function previewExcelFile(file) {
    try {
      const jsonData = await parseExcelToJSON(file);
      excelJSONData = jsonData;
      const previewText = JSON.stringify(jsonData.slice(0, 5), null, 2);
      const rowCount = jsonData.length;
      jsonPreviewCard.style.display = "block";
      jsonPreviewDiv.innerHTML = `<strong>✅ Excel parsed to JSON (${rowCount} records):</strong><br>
        <details open>
          <summary>📋 Preview (first 5 rows)</summary>
          <pre style="white-space: pre-wrap; font-size: 11px; background:#f1f3f5; padding:10px; border-radius:8px;">${previewText}${rowCount > 5 ? "\n... and " + (rowCount-5) + " more rows" : ""}</pre>
        </details>`;
      return jsonData;
    } catch (err) {
      console.error("Parse error:", err);
      messageDiv.innerHTML = "❌ Failed to parse Excel file. Check file format.";
      messageDiv.className = "msg error";
      return null;
    }
  }

  // Live units calculation
  currentReadingInput.addEventListener("input", function() {
    const val = parseFloat(this.value);
    if (!isNaN(val) && previousReading > 0) {
      const units = (val - previousReading).toFixed(2);
      unitsHint.innerHTML = `📊 Units to be recorded: ${units}`;
    } else if (!isNaN(val) && previousReading === 0) {
      unitsHint.innerHTML = `📊 Units: ${val.toFixed(2)} (first reading)`;
    } else {
      unitsHint.innerHTML = '';
    }
  });

  // Listen to file selection
  excelFileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await previewExcelFile(file);
  });

  // 🔥 SUBMIT: Store ONLY JSON in Firestore (NO FILE UPLOAD)
  window.submitReport = async function() {
    const file = excelFileInput.files[0];
    const currentReading = parseFloat(document.getElementById("currentReading").value);
    
    if (!file) {
      messageDiv.innerHTML = "❌ Please select an Excel file.";
      messageDiv.className = "msg error";
      return;
    }
    if (isNaN(currentReading) || currentReading < 0) {
      messageDiv.innerHTML = "❌ Please enter a valid current reading.";
      messageDiv.className = "msg error";
      return;
    }
    
    if (!currentUser) {
      messageDiv.innerHTML = "❌ User not authenticated.";
      messageDiv.className = "msg error";
      return;
    }
    
    // Check lock for editing
    if (existingDoc) {
      const data = existingDoc.data();
      const createdAt = data.createdAt?.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
      const diffHours = (new Date() - createdAt) / (1000 * 60 * 60);
      if (diffHours > 1) {
        messageDiv.innerHTML = "🔒 Cannot edit: Report is locked after 1 hour.";
        messageDiv.className = "msg error";
        return;
      }
    }
    
    messageDiv.innerHTML = "⏳ Processing Excel & storing JSON in Firestore...";
    messageDiv.className = "msg warning";
    
    try {
      // Parse Excel to JSON
      let jsonData = excelJSONData;
      if (!jsonData) {
        jsonData = await parseExcelToJSON(file);
      }
      
      if (!jsonData || jsonData.length === 0) {
        throw new Error("No valid data found in Excel file.");
      }
      
      // Calculate units consumed
      const unitsConsumed = previousReading === 0 ? currentReading : (currentReading - previousReading);
      
      // ✅ NO STORAGE - ONLY JSON DATA
      const reportData = {
        userId: currentUser.uid,
        userEmail: currentUser.email,
        date: getToday(),
        fileName: file.name,
        currentReading: currentReading,
        previousReading: previousReading,
        unitsConsumed: unitsConsumed,
        excelDataJSON: jsonData,        // 🔥 FULL Excel data as JSON
        totalRows: jsonData.length,
        updatedAt: Timestamp.now()
      };
      
      let docRef;
      if (existingDoc) {
        // Update existing report (keep original createdAt)
        await updateDoc(doc(db, "reports", existingDoc.id), reportData);
        docRef = existingDoc.id;
        messageDiv.innerHTML = `✅ Report UPDATED successfully! ${jsonData.length} rows stored as JSON in Firestore.`;
      } else {
        // Create new report
        reportData.createdAt = Timestamp.now();
        const docAdded = await addDoc(collection(db, "reports"), reportData);
        docRef = docAdded.id;
        messageDiv.innerHTML = `✅ NEW Report submitted! ${jsonData.length} Excel rows converted to JSON & stored in Firestore.`;
      }
      
      messageDiv.className = "msg success";
      
      // Show full JSON preview
      const jsonString = JSON.stringify(jsonData.slice(0, 10), null, 2);
      const totalRows = jsonData.length;
      jsonPreviewDiv.innerHTML = `<strong>✅ Stored in Firestore! Total ${totalRows} records.</strong><br>
        <strong>📊 Units consumed: ${unitsConsumed.toFixed(2)}</strong><br>
        <details open>
          <summary>📋 Click to expand JSON data (first 10 rows)</summary>
          <pre style="white-space: pre-wrap; font-size: 11px; background:#f1f3f5; padding:10px; border-radius:8px; max-height: 300px; overflow: auto;">${jsonString}${totalRows > 10 ? "\n\n... and " + (totalRows - 10) + " more rows" : ""}</pre>
        </details>
        <div style="margin-top:12px; padding:8px; background:#e8f4fd; border-radius:8px;">
          📍 Document ID: ${docRef}<br>
          📅 Date: ${getToday()}<br>
          🔢 Previous: ${previousReading} → Current: ${currentReading} → Units: ${unitsConsumed.toFixed(2)}
        </div>`;
      jsonPreviewCard.style.display = "block";
      
      // Refresh previous reading after 2 seconds
      setTimeout(async () => {
        await getPreviousReading();
        if (currentReadingInput) {
          currentReadingInput.value = '';
        }
      }, 2000);
      
    } catch (error) {
      console.error("Submission error:", error);
      messageDiv.innerHTML = `❌ Error: ${error.message}`;
      messageDiv.className = "msg error";
    }
  };

  // 🚪 Logout
  window.logout = async function() {
    await signOut(auth);
    window.location.href = "index.html";
  };
</script>
</body>
</html>
